name: Career Scout
on:
  schedule:
    - cron: '35 0 * * *'   # 9:35 AM Japan Time (scrape)
    - cron: '0 6 * * *'    # 3 PM Japan Time (daily hype)
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode: scrape, hype, or seed'
        required: false
        default: 'scrape'

jobs:
  run-scout:
    runs-on: ubuntu-latest
    if: github.event.schedule != '0 6 * * *' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Scraper
        if: github.event.inputs.mode != 'hype' && github.event.inputs.mode != 'seed'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          HEARTBEAT_WEBHOOK_URL: ${{ secrets.HEARTBEAT_WEBHOOK_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python main.py
      - name: Run Seed
        if: github.event.inputs.mode == 'seed'
        env:
          HEARTBEAT_WEBHOOK_URL: ${{ secrets.HEARTBEAT_WEBHOOK_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python main.py --seed
      - name: Run Hype
        if: github.event.inputs.mode == 'hype'
        env:
          HYPE_WEBHOOK_URL: ${{ secrets.HYPE_WEBHOOK_URL }}
        run: python main.py --hype
      - name: Commit state
        run: |
          git config user.name "Captain Hook"
          git config user.email "bot@scout.dev"
          git add seen_jobs.json
          git diff --cached --quiet || (git commit -m "Update seen jobs" && git push)

  daily-hype:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 6 * * *'
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Send Hype
        env:
          HYPE_WEBHOOK_URL: ${{ secrets.HYPE_WEBHOOK_URL }}
        run: python main.py --hype
